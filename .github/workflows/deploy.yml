name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: |
          if [ -n "$PAGES_BASE_PATH" ]; then
            export VITE_BASE_PATH="$PAGES_BASE_PATH"
          elif [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            export VITE_BASE_PATH="/"
          else
            export VITE_BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          fi

          npm run build

          if [ -n "$PAGES_CNAME" ]; then
            printf '%s\n' "$PAGES_CNAME" > dist/CNAME
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5